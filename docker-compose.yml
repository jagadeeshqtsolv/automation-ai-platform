services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # SQLite lives on the persistent volume
      DATABASE_URL: "file:/data/production.db"
      # Per-project framework files live on the persistent volume
      FRAMEWORKS_ROOT: "/data/frameworks"
      # Required: set in your .env file
      SESSION_SECRET: "${SESSION_SECRET}"
      # Optional: server-level fallback OpenAI key
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1}"
    volumes:
      # All runtime data (DB + framework files) on a named volume
      - app-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  app-data:
