services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # GitHub Packages token — needed to install @jagadeeshqtsolv/core during build
        # Add GITHUB_TOKEN=<your-pat> to your .env file
        GITHUB_TOKEN: "${GITHUB_TOKEN}"
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # SQLite lives on the persistent volume
      DATABASE_URL: "file:/data/production.db"
      # Per-project framework files live on the persistent volume
      FRAMEWORKS_ROOT: "/data/frameworks"
      # web-support source files bundled into the image (set in Dockerfile, listed here for clarity)
      WEB_CORE_ROOT: "/app/packages/core/web"
      # Required: min 32 characters — used for session tokens and encrypted secrets (API keys, git tokens)
      SESSION_SECRET: "${SESSION_SECRET}"
    volumes:
      # All runtime data (DB + framework files) on a named volume
      - app-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  app-data:
